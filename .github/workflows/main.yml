name: Workflow for Codecov Action
on: [push, pull_request]
jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        include:
          - os: windows-latest
            platform: windows
            files-script: .\coverage\script\coverage-final.json
            files-demo: .\coverage\calculator\coverage-final.json,.\coverage\coverage-test\coverage-final.json
            file-demo: .\coverage\coverage-final.json
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Run tests and collect coverage
        run: npm run test
      - name: Upload coverage to Codecov (script)
        uses: ./
        with:
          files: ${{ matrix.files-script }}
          flags: script,${{ matrix.platform }}
          name: codecov-script
          platform: ${{ matrix.platform }}
      - name: Upload coverage to Codecov (demo)
        uses: ./
        with:
          files: ${{ matrix.files-demo }}
          file: ${{ matrix.file-demo }}
          flags: script,${{ matrix.platform }}
          name: codecov-demo
          platform: ${{ matrix.platform }}
